
compute_environment: LOCAL_MACHINE
distributed_type: FSDP
downcast_bf16: 'no'
machine_rank: 0
main_training_function: main
mixed_precision: bf16
num_machines: 1
num_processes: 4          
rdzv_backend: static
same_network: true
use_cpu: false
fsdp_config:
  fsdp_version: 2
  fsdp_sharding_strategy: FULL_SHARD          # ZeRO-3 equivalent
  fsdp_auto_wrap_policy: TRANSFORMER_BASED_WRAP
  fsdp_transformer_layer_cls_to_wrap: Olmo3DecoderLayer   # <-- verify, see note
  fsdp_state_dict_type: FULL_STATE_DICT        # saves a normal HF checkpoint
  fsdp_offload_params: false                   # set true ONLY if you OOM
  fsdp_use_orig_params: true
  fsdp_activation_checkpointing: true          # do this HERE, not in SFTConfig
  fsdp_cpu_ram_efficient_loading: false
  fsdp_sync_module_states: true
  fsdp_reshard_after_forward: true